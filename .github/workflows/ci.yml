name: CI

on:
  push:
    # main/beta = post-merge run. renovate/** lets Renovate's branch-automerge
    # updates (which never open a PR) run `test` on the branch, so the
    # default-branch ruleset (required `test (3.14)` check, pull_request rule
    # dropped) can fast-forward main once the branch is green.
    branches: [main, beta, 'renovate/**']
  pull_request:
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        # The deselected tests fail on a pristine upstream/main checkout too —
        # they are pre-existing upstream bugs (cenodude/CrossWatch), not caused
        # by this fork. Deselecting keeps CI green without modifying upstream
        # source files; drop a line here once upstream fixes the corresponding test.
        # (test_app_auth_api.py::test_setup_lock_not_required_when_up_to_date_without_auth
        # was a fork-local bug, not an upstream one — fixed and removed from this list.)
        run: |
          python -m pytest \
            --deselect "tests/test_dashboard_widgets.py::test_recent_scrobble_widget_uses_nested_history_sync_item_art" \
            --deselect "tests/test_meta_api_episode_stills.py::test_episode_still_art_is_fetched_and_cached" \
            --deselect "tests/test_playback_progress.py::test_same_title_with_matching_progress_can_still_combine_across_profiles"
