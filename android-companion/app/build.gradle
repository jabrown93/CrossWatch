apply plugin: 'com.android.application'

android {
    namespace 'app.crosswatch.companion'
    compileSdkVersion 'android-36.1'

    defaultConfig {
        applicationId 'app.crosswatch.companion'
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName '0.1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
